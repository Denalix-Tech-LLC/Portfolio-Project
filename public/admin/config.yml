backend:
  name: github
  repo: Denalix-Tech-LLC/Portfolio-Project
  branch: main
  base_url: https://prasannakumar.denalixtech.com
  auth_endpoint: /api/auth
  commit_messages:
    update: 'content: update {{path}} via CMS'
    uploadMedia: 'content: upload {{path}}'
    deleteMedia: 'content: remove {{path}}'

# Set to true only when running `npx decap-server` for local editing.
local_backend: false

media_folder: public/uploads
public_folder: /uploads

site_url: https://prasannakumar.denalixtech.com
display_url: https://prasannakumar.denalixtech.com

collections:
  - name: profile
    label: Profile & Site Copy
    delete: false
    files:
      - name: profile
        label: Profile
        file: content/profile.json
        fields:
          - { name: name, label: Full name, widget: string }
          - { name: shortName, label: Short name (nav / hero), widget: string }
          - { name: initials, label: Initials, widget: string, required: false }
          - { name: portrait, label: Portrait photo, widget: image, required: false }
          - name: roles
            label: Hero roles (typewriter cycles these)
            widget: list
            field: { name: role, label: Role, widget: string }
          - { name: location, label: Location, widget: string }
          - { name: availability, label: Availability badge text, widget: string }
          - { name: email, label: Email, widget: string }
          - { name: phone, label: Phone, widget: string }
          - name: socials
            label: Social links
            widget: list
            fields:
              - { name: label, label: Label (LinkedIn / GitHub / Email), widget: string }
              - { name: href, label: URL, widget: string }
          - name: hero
            label: Hero section
            widget: object
            fields:
              - { name: headline, label: Headline, widget: text }
              - { name: subhead, label: Sub-headline, widget: text }
              - name: primaryCta
                label: Primary button
                widget: object
                fields:
                  - { name: label, label: Text, widget: string }
                  - { name: href, label: Link, widget: string }
              - name: secondaryCta
                label: Secondary button
                widget: object
                fields:
                  - { name: label, label: Text, widget: string }
                  - { name: href, label: Link, widget: string }
          - name: stats
            label: Hero stats
            widget: list
            fields:
              - { name: value, label: Number, widget: number, value_type: float }
              - { name: decimals, label: Decimal places, widget: number, default: 0, required: false }
              - { name: suffix, label: Suffix (%, +, …), widget: string, required: false }
              - { name: label, label: Caption, widget: string }
          - { name: summary, label: About summary paragraph, widget: text }
          - name: skillGroups
            label: Skill groups
            widget: list
            fields:
              - { name: title, label: Group title, widget: string }
              - name: items
                label: Skills
                widget: list
                field: { name: item, label: Skill, widget: string }
          - name: contact
            label: Contact section
            widget: object
            fields:
              - { name: heading, label: Heading, widget: string }
              - { name: blurb, label: Blurb, widget: text }

  - name: experience
    label: Experience
    delete: false
    files:
      - name: experience
        label: Work experience
        file: content/experience.json
        fields:
          - name: jobs
            label: Jobs (top = most recent)
            widget: list
            fields:
              - { name: company, label: Company, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: period, label: Period (e.g. Jan 2022 — Aug 2023), widget: string }
              - { name: location, label: Location, widget: string }
              - { name: current, label: Current job? (shows live dot), widget: boolean, default: false }
              - name: stack
                label: Tech stack chips
                widget: list
                field: { name: tech, label: Tech, widget: string }
              - name: highlights
                label: Highlights (bullet points)
                widget: list
                field: { name: point, label: Point, widget: text }

  - name: education
    label: Education & Certifications
    delete: false
    files:
      - name: education
        label: Education & Certifications
        file: content/education.json
        fields:
          - name: education
            label: Degrees
            widget: list
            fields:
              - { name: school, label: School, widget: string }
              - { name: degree, label: Degree, widget: string }
              - { name: period, label: Period, widget: string }
              - { name: location, label: Location, widget: string }
          - name: certifications
            label: Certifications
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: href, label: Verify link (optional), widget: string, required: false }
